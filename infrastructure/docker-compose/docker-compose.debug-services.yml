---
# Contains services used to debug the application and access databases

services:
  pgadmin:
    image: dpage/pgadmin4:9.1
    container_name: pgadmin
    networks:
      - net
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "${PGADMIN_PORT}:80"
    restart: on-failure
    volumes:
      - "pgadmin:/var/lib/pgadmin"

  # Use only for local development purposes.
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    environment:
      HOMEPAGE_ALLOWED_HOSTS: localhost:${HOMEPAGE_PORT}
    ports:
      - "${HOMEPAGE_PORT}:3000"
    restart: unless-stopped
    volumes:
      - ../docker/homepage/config/docker.yaml:/app/config/docker.yaml

  # Used to forward read-only docker information
  # to Homepage. Use Homepage only for local development
  # purposes.
  dockerproxy:
    image: ghcr.io/tecnativa/docker-socket-proxy:latest
    container_name: dockerproxy
    environment:
      - CONTAINERS=1 # Allow access to viewing containers
      - SERVICES=1 # Allow access to viewing services (necessary when using Docker Swarm)
      - TASKS=1 # Allow access to viewing tasks (necessary when using Docker Swarm)
      - POST=0 # Disallow any POST operations (effectively read-only)
    ports:
      - 127.0.0.1:2375:2375
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro # Mounted as read-only
    restart: unless-stopped

networks:
  net:

volumes:
  grafana:
  pgadmin:
