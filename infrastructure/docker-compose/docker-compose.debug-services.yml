---
# Contains services used to debug the application and access databases

services:
  pgadmin:
    image: dpage/pgadmin4:9.1
    container_name: pgadmin
    networks:
      - net
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "${PGADMIN_PORT}:80"
    restart: on-failure
    volumes:
      - "pgadmin:/var/lib/pgadmin"

  # Use only for local development purposes.
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    environment:
      HOMEPAGE_ALLOWED_HOSTS: localhost:${HOMEPAGE_PORT}
    ports:
      - "${HOMEPAGE_PORT}:3000"
    restart: unless-stopped
    volumes:
      - ../docker/homepage/config/docker.yaml:/app/config/docker.yaml:ro

networks:
  net:

volumes:
  grafana:
  pgadmin:
